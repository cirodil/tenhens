version: "3.8"

services:
  fullstack:
    build: ./fullstack
    env_file: .env
    volumes:
      - egg_data:/app/data
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - fullstack
    restart: unless-stopped
    networks:
      - app-network

volumes:
  egg_data:
  letsencrypt:

networks:
  app-network:
    driver: bridge
